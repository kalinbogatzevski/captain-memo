name: CI

on:
  push:
    branches: [master]
  pull_request:
  # Advisories appear without anyone pushing. Without a schedule, a vulnerability
  # published tomorrow stays invisible until the next commit.
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

jobs:
  # Dependency audit. This job exists because Dependabot CANNOT see this repo's real
  # dependency tree: GitHub's dependency graph does not parse `bun.lock`, so it reads only
  # the ~10 DIRECT deps out of package.json — as version RANGES ("^1.25.1"), not resolved
  # versions. Bun actually resolves 115 packages.
  #
  # That gap is not theoretical: it is exactly how 10 advisories (1 high, 9 moderate) sat
  # unnoticed in `hono` and `qs`, both pulled in transitively via @modelcontextprotocol/sdk.
  # Dependabot could not have flagged them — it never saw the packages. `bun audit` resolves
  # the same tree bun installs, so it does.
  #
  # Keep Dependabot on as well: it still covers direct npm deps, the Python embedder's
  # requirements.txt, and the GitHub Actions pins, none of which bun audit looks at.
  #
  # `bun audit` exits 1 on any finding (verified). If an advisory is genuinely unreachable
  # here AND has no fix available, pin it out with `--ignore=<CVE>` and say why — do not
  # weaken this to `|| true`, which would silently turn the gate off for everything.
  audit:
    name: audit (transitive deps — bun.lock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: bun audit (fails on any advisory)
        run: bun audit

  # Moat guard: fail if federation code ever lands on the OSS master branch. The private `federation`
  # branch is gitlab-only and never reaches github; this is the CI belt behind the per-clone pre-push hook.
  moat:
    name: moat (no federation code on master)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the master ref resolves on PR runs
      - name: No federation code on master
        run: bash scripts/moat-guard.sh

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # Guardrail (BUG 1): the plugin entrypoints must bundle cleanly from source
      # and the bundle must actually run. (A byte-for-byte drift check isn't
      # viable — `bun build` output varies across bun versions — so we verify the
      # source still bundles and the hook bundle executes, not the exact bytes.)
      - name: Plugin bundles build + run
        if: runner.os == 'Linux'
        run: |
          bun run build:plugin
          test -s plugin/dist/mcp-server.js
          printf '%s' '{"hook_event_name":"UserPromptSubmit","prompt":"x","cwd":"/tmp/p","session_id":"s"}' | bun plugin/dist/captain-memo-hook.js UserPromptSubmit

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        # 30s per-test/hook timeout (default 5s): the windows-latest runner's disk
        # is slow, so I/O-heavy worker/VACUUM setup+teardown hooks intermittently
        # blew the 5s default. Generous CI timeout removes that flake class; local
        # `bun test` keeps the fast 5s default.
        run: bun test --timeout 30000

      # Windows-only: prove the native sqlite-vec loadable extension (vec0.dll)
      # is present and loads under bun:sqlite. A node_modules built off-target
      # would silently miss the DLL — this catches it before it reaches a user.
      - name: Smoke-test native vec0.dll (Windows)
        if: runner.os == 'Windows'
        run: >
          bun -e "import { Database } from 'bun:sqlite'; import * as sqliteVec from 'sqlite-vec'; const db = new Database(':memory:'); sqliteVec.load(db); const { v } = db.query('select vec_version() as v').get(); console.log('sqlite-vec', v); db.close();"
